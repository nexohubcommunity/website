<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexo Hub | Sign Up</title>
    <style>
      :root {
        --bg: #000;
        --panel: #0f0f0f;
        --text: #fff;
        --muted: #bdbdbd;
        --line: #2b2b2b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top, #1a1a1a 0%, #000 50%);
        min-height: 100vh;
      }

      .container {
        width: min(820px, 92vw);
        margin: 0 auto;
      }

      .topbar {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        padding: 1rem 0;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        border: 1px solid #fff;
        color: #fff;
        text-decoration: none;
        border-radius: 999px;
        padding: 0.4rem 0.8rem;
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0.4rem 0 0.6rem;
      }

      p.subtitle {
        margin: 0 0 1.4rem;
        color: var(--muted);
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1rem;
        padding-bottom: 2rem;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 1rem;
      }

      form {
        display: grid;
        gap: 0.55rem;
      }

      label {
        font-size: 0.9rem;
      }

      input {
        width: 100%;
        background: #0a0a0a;
        color: var(--text);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 0.65rem 0.75rem;
      }

      button {
        cursor: pointer;
        border: none;
        border-radius: 10px;
        background: #fff;
        color: #000;
        font-weight: 700;
        padding: 0.6rem 0.85rem;
      }

      .status {
        margin-top: 0.7rem;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .hint {
        color: var(--muted);
        font-size: 0.85rem;
        margin: 0.45rem 0 0;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <nav class="topbar">
        <a class="pill" href="/">Home</a>
        <a class="pill" href="/login">Login</a>
      </nav>

      <h1>Sign Up</h1>
      <p class="subtitle">Create an account or start passwordless email sign-in for the same project.</p>

      <section class="layout">
        <article class="panel">
          <h2>Email + Password Registration</h2>
          <form id="signup-form">
            <label for="signup-email">Email</label>
            <input id="signup-email" name="email" type="email" autocomplete="email" required />
            <label for="signup-password">Password</label>
            <input id="signup-password" name="password" type="password" autocomplete="new-password" minlength="6" required />
            <button type="submit">Create Account</button>
          </form>
          <p class="hint">After signup, you will be redirected to the home page.</p>
        </article>

        <article class="panel">
          <h2>Email Link (Passwordless)</h2>
          <form id="email-link-form">
            <label for="signup-email-link">Email</label>
            <input id="signup-email-link" name="email" type="email" autocomplete="email" required />
            <button type="submit">Send Passwordless Sign-In Link</button>
          </form>
          <p class="hint">This sends a magic sign-in link to your email.</p>
        </article>

        <article class="panel">
          <h2>Status</h2>
          <div id="status" class="status">Waiting for action...</div>
        </article>
      </section>
    </main>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
      import {
        initializeAppCheck,
        ReCaptchaV3Provider,
      } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app-check.js";
      import {
        getAuth,
        setPersistence,
        browserLocalPersistence,
        createUserWithEmailAndPassword,
        sendSignInLinkToEmail,
      } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAMJk2z0CSSmnh-CG5J0ibvwiCZUU5hlEE",
        authDomain: "nexo-hub-ab3ab.firebaseapp.com",
        projectId: "nexo-hub-ab3ab",
        storageBucket: "nexo-hub-ab3ab.firebasestorage.app",
        messagingSenderId: "1047400625373",
        appId: "1:1047400625373:web:71ae25fbe6d4417b7c1734",
        measurementId: "G-HGD7STBNK8",
      };

      const appCheckSiteKey = "6LdDp8AsAAAAAD5s9ie31k302Z9YGtdIjd5S5Eon";
      const appCheckAllowedHosts = new Set([
        "nexo-hub-community.web.app",
        "nexo-hub-community.firebaseapp.com",
      ]);
      const EMAIL_LINK_STORAGE_KEY = "nexoEmailForSignIn";

      const app = initializeApp(firebaseConfig);
      const shouldEnableAppCheck =
        Boolean(appCheckSiteKey) && appCheckAllowedHosts.has(window.location.hostname);
      if (shouldEnableAppCheck) {
        initializeAppCheck(app, {
          provider: new ReCaptchaV3Provider(appCheckSiteKey),
          isTokenAutoRefreshEnabled: true,
        });
      }
      const auth = getAuth(app);
      await setPersistence(auth, browserLocalPersistence);

      const signupForm = document.getElementById("signup-form");
      const emailLinkForm = document.getElementById("email-link-form");
      const status = document.getElementById("status");

      const continueUrl = `https://nexo-hub-community.web.app/login`;
      const actionCodeSettings = {
        url: continueUrl,
        handleCodeInApp: true,
      };

      function setStatus(message) {
        status.textContent = message;
      }

      signupForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const formData = new FormData(signupForm);
        const email = String(formData.get("email") || "").trim();
        const password = String(formData.get("password") || "");

        try {
          await createUserWithEmailAndPassword(auth, email, password);
          setStatus("Signup successful. Redirecting...");
          window.location.assign("/");
        } catch (error) {
          setStatus(`Signup failed: ${error.message}`);
        }
      });

      emailLinkForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const formData = new FormData(emailLinkForm);
        const email = String(formData.get("email") || "").trim();

        try {
          await sendSignInLinkToEmail(auth, email, actionCodeSettings);
          window.localStorage.setItem(EMAIL_LINK_STORAGE_KEY, email);
          setStatus("Passwordless link sent. Check your inbox and finish in Login page.");
        } catch (error) {
          setStatus(`Could not send email link: ${error.message}`);
        }
      });
    </script>
  </body>
</html>
