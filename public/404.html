<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexo Hub | 404</title>
    <style>
      :root {
        --bg: #000;
        --panel: #0f0f0f;
        --text: #fff;
        --muted: #bdbdbd;
        --line: #2b2b2b;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top, #1a1a1a 0%, #000 50%);
      }

      .card {
        width: min(640px, 92vw);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 1.4rem;
      }

      h1 { margin: 0 0 0.7rem; font-size: clamp(1.8rem, 5vw, 2.7rem); }
      p { margin: 0 0 1rem; color: var(--muted); }

      .pill {
        display: inline-flex;
        align-items: center;
        border: 1px solid #fff;
        color: #fff;
        text-decoration: none;
        border-radius: 999px;
        padding: 0.45rem 0.85rem;
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>404 — Page Not Found</h1>
      <p>The page you requested does not exist. Head back to Nexo Hub and continue browsing.</p>
      <a class="pill" href="/">Go Home</a>
    </main>
  </body>
</html>
